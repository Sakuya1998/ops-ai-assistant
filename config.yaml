app:
  name: ops-ai-assistant
  env: local
  log_level: debug

server:
  http_port: 8080
  read_timeout: 30s
  write_timeout: 30s

llm:
  provider: deepseek
  api_key: ${DEEPSEEK_API_KEY}
  model: deepseek-chat
  temperature: 0.7
  max_tokens: 4096

datasources:
  prometheus:
    url: http://localhost:9090
    timeout: 10s

  loki:
    url: http://localhost:3100
    timeout: 10s

  kubernetes:
    in_cluster: false
    kubeconfig: ~/.kube/config

database:
  postgres:
    host: localhost
    port: 5432
    user: ops_ai
    password: ops_ai_pass
    dbname: ops_ai
    sslmode: disable
    max_open_conns: 25
    max_idle_conns: 5

  redis:
    addr: localhost:6379
    password: ""
    db: 0
    pool_size: 10

vikingdb:
  endpoint: http://localhost:8081
  collection: ops_knowledge
  api_key: ${VIKINGDB_API_KEY}

observability:
  tracing:
    enabled: true
    endpoint: http://localhost:4318

  metrics:
    enabled: true
    port: 9091

policy:
  approval_required_risk_levels:
    - high

  rbac:
    enabled: true

audit:
  enabled: true
  retention_days: 1095
